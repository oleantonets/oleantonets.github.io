<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 0 24px;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding-top: 0;
        }

        .progress-card {
            background: rgba(255, 255, 255, 0.2);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 24px;
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            position: relative;
            overflow: hidden;
        }

        .progress-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            margin-bottom: 12px;
        }

        .progress-level-label {
            font-size: 17px;
            color: #f8fafc;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .progress-level-value {
            font-size: 17px;
            font-weight: 700;
            color: #f8fafc;
        }

        .progress-bar-wrapper {
            height: 16px;
            background: rgba(167, 139, 250, 0.15);
            border: 1px solid rgba(167, 139, 250, 0.15);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.4);
            transition: width 0.3s ease;
        }

        .progress-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-points {
            font-size: 12px;
            color: #cbd5e1;
        }

        .progress-points-value {
            color: #f8fafc;
            font-weight: 600;
        }

        .progress-required {
            font-size: 12px;
            color: #cbd5e1;
        }

        .progress-required-value {
            color: #f8fafc;
            font-weight: 600;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            margin-top: 24px;
        }

        .game-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 28px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .game-cell:hover:not(.matched) {
            transform: scale(1.30);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            filter: brightness(1.2);
        }

        .game-cell.selected {
            transform: scale(1.10);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .game-cell.matched {
            opacity: 0;
            cursor: default;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .num-1 { background: #f472b6; color: white; }
        .num-2 { background: #60a5fa; color: white; }
        .num-3 { background: #34d399; color: white; }
        .num-4 { background: #fbbf24; color: white; }
        .num-5 { background: #a78bfa; color: white; }
        .num-6 { background: #fb7185; color: white; }
        .num-7 { background: #06b6d4; color: white; }
        .num-8 { background: #c084fc; color: white; }

        .empty-glass {
            background: #4b5563;
            border: none;
            cursor: default;
        }

        .empty-glass:hover {
            transform: none;
            box-shadow: none;
            filter: none;
        }

        .level-up-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .level-up-modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
        }

        .modal-content h2 {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .modal-content button {
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: transform 0.2s ease;
        }

        .modal-content button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-card">
            <div class="progress-header">
                <span class="progress-level-label">Level</span>
                <span class="progress-level-value" id="levelValue">1</span>
            </div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="progress-footer">
                <div class="progress-points">
                    Points: <span class="progress-points-value" id="pointsValue">0</span>
                </div>
                <div class="progress-required">
                    Required: <span class="progress-required-value" id="requiredValue">32</span>
                </div>
            </div>
        </div>

        <div class="game-grid" id="gameGrid"></div>
    </div>

    <div class="level-up-modal" id="levelUpModal">
        <div class="modal-content">
            <h2>🎉 Level Up!</h2>
            <p id="levelUpText">You've reached Level 2!</p>
            <button onclick="continuGame()">Continue</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 8;
        const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
        const NUM_PAIRS = TOTAL_CELLS / 2;
        const NUMBERS = [1, 2, 3, 4, 5, 6, 7, 8];

        let gameState = {
            level: 1,
            points: 0,
            requiredPoints: NUM_PAIRS,
            selectedCells: [],
            matchedPairs: 0,
            totalPairs: NUM_PAIRS,
            locked: false,
            cells: []
        };

        function initGame() {
            gameState.cells = createGameBoard();
            renderBoard();
            updateProgress();
        }

        function createGameBoard() {
            const board = [];
            for (let num of NUMBERS) {
                for (let i = 0; i < 8; i++) {
                    board.push(num);
                }
            }
            return shuffleArray(board);
        }

        function shuffleArray(arr) {
            const newArr = [...arr];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function renderBoard() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            gameState.cells.forEach((num, index) => {
                const cell = document.createElement('div');
                cell.className = `game-cell num-${num}`;
                cell.textContent = num;
                cell.dataset.index = index;
                cell.dataset.number = num;

                if (gameState.matchedPairs > 0) {
                    const matchedIndices = JSON.parse(localStorage.getItem('matchedIndices') || '[]');
                    if (matchedIndices.includes(index)) {
                        cell.classList.add('matched');
                    }
                }

                cell.addEventListener('click', () => handleCellClick(index, cell));
                grid.appendChild(cell);
            });
        }

        function handleCellClick(index, cellElement) {
            if (gameState.locked) return;
            if (cellElement.classList.contains('matched')) return;
            if (gameState.selectedCells.some(cell => cell.index === index)) return;

            gameState.selectedCells.push({ index, element: cellElement });
            cellElement.classList.add('selected');

            if (gameState.selectedCells.length === 2) {
                checkForMatch();
            }
        }

        function checkForMatch() {
            gameState.locked = true;
            const [first, second] = gameState.selectedCells;

            setTimeout(() => {
                if (first.element.dataset.number === second.element.dataset.number) {
                    first.element.classList.add('matched');
                    second.element.classList.add('matched');
                    gameState.matchedPairs++;
                    gameState.points += 10;

                    const matchedIndices = JSON.parse(localStorage.getItem('matchedIndices') || '[]');
                    matchedIndices.push(first.index, second.index);
                    localStorage.setItem('matchedIndices', JSON.stringify(matchedIndices));

                    if (gameState.matchedPairs === gameState.totalPairs) {
                        nextLevel();
                    }
                } else {
                    first.element.classList.remove('selected');
                    second.element.classList.remove('selected');
                }

                gameState.selectedCells = [];
                gameState.locked = false;
                updateProgress();
            }, 600);
        }

        function nextLevel() {
            gameState.level++;
            gameState.points = 0;
            gameState.matchedPairs = 0;
            gameState.requiredPoints = gameState.totalPairs;
            localStorage.setItem('matchedIndices', '[]');

            const modal = document.getElementById('levelUpModal');
            document.getElementById('levelUpText').textContent = `You've reached Level ${gameState.level}!`;
            modal.classList.add('show');
        }

        function continuGame() {
            document.getElementById('levelUpModal').classList.remove('show');
            initGame();
        }

        function updateProgress() {
            const percentage = (gameState.points / gameState.requiredPoints) * 100;
            document.getElementById('progressBar').style.width = Math.min(percentage, 100) + '%';
            document.getElementById('pointsValue').textContent = gameState.points;
            document.getElementById('requiredValue').textContent = gameState.requiredPoints;
            document.getElementById('levelValue').textContent = gameState.level;
        }

        initGame();
    </script>
</body>
</html>
