<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 0 24px;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding-top: 0;
        }

        .progress-card {
            background: rgba(255, 255, 255, 0.2);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 24px;
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            position: relative;
            overflow: hidden;
        }

        .progress-card::before {
            display: none;
        }

        .progress-card::after {
            display: none;
        }

        .progress-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            margin-bottom: 12px;
        }

        .progress-level-label {
            font-size: 17px;
            color: #f8fafc;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .progress-level-value {
            font-size: 17px;
            font-weight: 700;
            color: #f8fafc;
        }

        .progress-bar-wrapper {
            height: 16px;
            background: rgba(167, 139, 250, 0.15);
            border: 1px solid rgba(167, 139, 250, 0.15);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 86%;
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.4);
        }

        .progress-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-points {
            font-size: 12px;
            color: #cbd5e1;
        }

        .progress-points-value {
            color: #f8fafc;
            font-weight: 600;
        }

        .progress-required {
            font-size: 12px;
            color: #cbd5e1;
        }

        .progress-required-value {
            color: #f8fafc;
            font-weight: 600;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            margin-top: 24px;
        }

        .game-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 28px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            transform-origin: center;
            position: relative;
            z-index: 1;
        }

        .game-cell:hover {
            transform: scale(1.15);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            filter: brightness(1.2);
            z-index: 10;
        }

        .num-1 { background: #f472b6; color: white; }
        .num-2 { background: #60a5fa; color: white; }
        .num-3 { background: #34d399; color: white; }
        .num-4 { background: #fbbf24; color: white; }
        .num-5 { background: #a78bfa; color: white; }
        .num-6 { background: #fb7185; color: white; }
        .num-7 { background: #06b6d4; color: white; }
        .num-8 { background: #c084fc; color: white; }
        .num-9 { background: #f97316; color: white; }

        .empty-glass {
            background: #4b5563;
            border: none;
            cursor: default;
        }

        .empty-glass:hover {
            transform: none;
            box-shadow: none;
            filter: none;
        }

        .game-cell.active {
            transform: scale(1.15);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            filter: brightness(1.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-card">

                <span class="progress-level-label">Level</span>

            <div class="progress-footer">

                <div class="progress-required">

        <div class="game-cell num-4">4</div>
        <div class="game-cell num-5">5</div>
        <div class="game-cell num-6">6</div>
        <div class="game-cell num-7">7</div>
        <div class="game-cell num-8">8</div>
        <div class="game-cell num-9">9</div>
        <div class="game-cell num-1">1</div>

        </div>
    </div>

    <script>
        const gameCells = document.querySelectorAll('.game-cell:not(.empty-glass)');

        gameCells.forEach(cell => {
            cell.addEventListener('click', function() {
                this.classList.toggle('active');
            });

            cell.addEventListener('touchend', function(e) {
                e.preventDefault();
                this.classList.toggle('active');
            });

            cell.addEventListener('touchstart', function() {
                this.style.opacity = '0.8';
            });

            cell.addEventListener('touchend', function() {
                this.style.opacity = '1';
            });
        });
    </script>
</body>
</html>
